<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的提示词库</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-left">
        <h1 class="nav-logo">我的提示词库</h1>
      </div>
      <div class="nav-center">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="搜索提示词或标签..." autocomplete="off">
        </div>
        <div class="tag-filter">
          <button id="tagFilterBtn" class="btn btn-outline tag-filter-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
            标签
          </button>
          <div id="tagDropdown" class="tag-dropdown"></div>
        </div>
      </div>
      <div class="nav-right">
        <button id="syncStatusBtn" class="btn btn-icon sync-btn" title="未登录">
          <span id="syncIcon" class="sync-icon">&#9733;</span>
        </button>
        <button id="settingsBtn" class="btn btn-icon" title="设置">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <button id="addBtn" class="btn btn-primary add-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          添加
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== 主内容区 ===== -->
  <main class="main-content">
    <div id="gallery" class="gallery"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>没有找到作品</p>
      <span class="empty-hint">试试其他关键词或添加新作品</span>
    </div>
  </main>

  <!-- ===== 详情模态框 ===== -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal detail-modal">
      <button id="detailClose" class="modal-close">&times;</button>
      <div class="detail-layout">
        <div class="detail-image-panel">
          <img id="detailImage" src="" alt="详情图片">
        </div>
        <div class="detail-info-panel">
          <div id="detailTags" class="detail-tags"></div>
          <div class="detail-section">
            <h3>提示词</h3>
            <p id="detailPrompt" class="detail-prompt"></p>
          </div>
          <div class="detail-section">
            <h3>图片链接</h3>
            <p id="detailImageUrl" class="detail-url"></p>
          </div>
          <div class="detail-actions">
            <button id="detailCopyBtn" class="btn btn-primary">复制提示词</button>
            <button id="detailEditBtn" class="btn btn-outline">编辑</button>
            <button id="detailDeleteBtn" class="btn btn-danger">删除</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 表单模态框 ===== -->
  <div id="formModal" class="modal-overlay">
    <div class="modal form-modal">
      <div class="modal-header">
        <h2 id="formTitle">添加作品</h2>
        <button id="formClose" class="modal-close">&times;</button>
      </div>
      <form id="workForm" class="form-body">
        <div class="form-group">
          <label for="imageUrl">图片链接</label>
          <input type="url" id="imageUrl" placeholder="https://..." required>
          <div id="imagePreview" class="image-preview" style="display:none;">
            <img id="previewImg" src="" alt="预览">
          </div>
        </div>
        <div class="form-group">
          <label for="prompt">提示词</label>
          <textarea id="prompt" rows="4" placeholder="输入 AI 提示词..." required></textarea>
        </div>
        <div class="form-group">
          <label for="tags">标签（逗号分隔）</label>
          <input type="text" id="tags" placeholder="例如：风景, 自然, 山" autocomplete="off">
          <div id="tagSuggestions" class="tag-suggestions"></div>
        </div>
        <div class="form-group">
          <label for="note">备注</label>
          <textarea id="note" rows="2" placeholder="可选备注信息..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="formCancelBtn" class="btn btn-outline">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== 设置面板 ===== -->
  <div id="settingsOverlay" class="settings-overlay"></div>
  <aside id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h2>设置</h2>
      <button id="settingsClose" class="modal-close">&times;</button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h3>数据管理</h3>
        <div class="settings-row">
          <span>导出备份</span>
          <button id="exportBtn" class="btn btn-outline btn-sm">导出 JSON</button>
        </div>
        <div class="settings-row">
          <span>导入数据</span>
          <button id="importBtn" class="btn btn-outline btn-sm">导入 JSON</button>
          <input type="file" id="importFile" accept=".json" hidden>
        </div>
        <div class="settings-row">
          <span>重置数据</span>
          <button id="resetBtn" class="btn btn-danger btn-sm">重置为示例</button>
        </div>
      </div>

      <div class="settings-section">
        <h3>外观</h3>
        <div class="settings-row">
          <span>暗黑模式</span>
          <label class="toggle">
            <input type="checkbox" id="darkModeToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <h3>存储</h3>
        <div class="settings-row">
          <span id="storageStats">计算中...</span>
        </div>
      </div>

      <div class="settings-section">
        <h3>账户</h3>
        <div class="settings-row">
          <span id="accountStatusText">未登录 — 同步功能不可用</span>
          <div id="accountStatus"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== 登录模态框（全屏，不可跳过） ===== -->
  <div id="loginModal" class="login-overlay">
    <div class="login-box">
      <h2 class="login-title">我的提示词库</h2>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="loginUsername">用户名</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary login-submit-btn">登录</button>
      </form>
    </div>
  </div>

  <!-- ===== Toast 容器 ===== -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ===== Supabase CDN ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ===== Supabase 配置占位（用户在 sync.js 中自行填入） ===== -->
  <script>
    window.SUPABASE_CONFIG = {
      url: "",     // 填入你的 Supabase Project URL
      anonKey: ""  // 填入你的 Supabase Anon Key
    };
  </script>

  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
